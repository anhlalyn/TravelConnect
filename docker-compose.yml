name: travelconnect

x-db-common: &db-common
  image: mysql:8.0
  container_name: travelconnect-db
  restart: unless-stopped
  volumes:
    - mysql_data:/var/lib/mysql
    - ./database/travelconnect.sql:/docker-entrypoint-initdb.d/01-init.sql:ro

x-backend-common: &backend-common
  container_name: travelconnect-backend
  restart: unless-stopped
  environment:
    PORT: 3000
    DB_HOST: db
    DEFAULT_ADMIN_EMAIL: admin@travelconnect.vn
    DEFAULT_ADMIN_PASSWORD: Admin@12345
    DEFAULT_ADMIN_NAME: Quan tri TravelConnect

x-frontend-common: &frontend-common
  container_name: travelconnect-frontend
  restart: unless-stopped

services:
  db:
    <<: *db-common
    profiles: ["dev"]
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: travelconnect
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    <<: *backend-common
    profiles: ["dev"]
    build:
      context: ./backend
      target: dev
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3000
      DB_HOST: db
      DB_USER: root
      DB_PASS: root
      DB_NAME: travelconnect
      JWT_SECRET: travelconnect-secret
      CLIENT_URL: http://localhost:5173
      DEFAULT_ADMIN_EMAIL: admin@travelconnect.vn
      DEFAULT_ADMIN_PASSWORD: Admin@12345
      DEFAULT_ADMIN_NAME: Quan tri TravelConnect
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
    command: npm run dev -- --legacy-watch
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./backend/uploads:/app/uploads

  frontend:
    <<: *frontend-common
    profiles: ["dev"]
    build:
      context: ./frontend
      target: dev
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:3000/api
      VITE_APP_BASE_URL: http://localhost:3000
      VITE_SOCKET_URL: http://localhost:3000
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  db-prod:
    <<: *db-common
    profiles: ["prod"]
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS:-}
      MYSQL_DATABASE: ${DB_NAME:-travelconnect}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASS:-}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend-prod:
    <<: *backend-common
    profiles: ["prod"]
    build:
      context: ./backend
      target: prod
    depends_on:
      db-prod:
        condition: service_healthy
    environment:
      PORT: 3000
      DB_HOST: db-prod
      DB_USER: ${DB_USER:-root}
      DB_PASS: ${DB_PASS:-}
      DB_NAME: ${DB_NAME:-travelconnect}
      JWT_SECRET: ${JWT_SECRET:-}
      CLIENT_URL: ${CLIENT_URL:-}
      DEFAULT_ADMIN_EMAIL: ${DEFAULT_ADMIN_EMAIL:-admin@travelconnect.vn}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-Admin@12345}
      DEFAULT_ADMIN_NAME: ${DEFAULT_ADMIN_NAME:-Quan tri TravelConnect}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/api/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - uploads_data:/app/uploads

  frontend-prod:
    <<: *frontend-common
    profiles: ["prod"]
    build:
      context: ./frontend
      target: prod
      args:
        VITE_API_BASE_URL: /api
        VITE_APP_BASE_URL: ""
        VITE_SOCKET_URL: ""
    depends_on:
      backend-prod:
        condition: service_healthy
    ports:
      - "80:80"

volumes:
  mysql_data:
  uploads_data:
