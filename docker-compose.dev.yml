services:
  db:
    image: mysql:8.0
    container_name: travelconnect-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: travelconnect
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/travelconnect.sql:/docker-entrypoint-initdb.d/01-init.sql:ro

  backend:
    build:
      context: ./backend
      target: dev
    container_name: travelconnect-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3000
      DB_HOST: db
      DB_USER: root
      DB_PASS: root
      DB_NAME: travelconnect
      JWT_SECRET: travelconnect-secret
      CLIENT_URL: http://localhost:5173
      DEFAULT_ADMIN_EMAIL: admin@travelconnect.vn
      DEFAULT_ADMIN_PASSWORD: Admin@12345
      DEFAULT_ADMIN_NAME: Quan tri TravelConnect
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
    command: npm run dev -- --legacy-watch
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: travelconnect-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:3000/api
      VITE_APP_BASE_URL: http://localhost:3000
      VITE_SOCKET_URL: http://localhost:3000
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mysql_data:
